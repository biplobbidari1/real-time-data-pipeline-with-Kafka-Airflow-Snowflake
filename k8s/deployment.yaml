
apiVersion: apps/v1
kind: Deployment
metadata:
 name: elite-app
spec:
 replicas: 3
 selector:
  matchLabels:
   app: elite
 template:
  metadata:
   labels:
    app: elite
  spec:
   containers:
   - name: api
     image: elite:latest
     ports:
     - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
 name: elite-service
spec:
 type: NodePort
 selector:
  app: elite
 ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30007
